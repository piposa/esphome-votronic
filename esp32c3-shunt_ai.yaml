substitutions:
  name: votronic-smart-shunt
  device_description: "Monitor a Votronic Solar Charger via the display link port (UART)"
  external_components_source: github://syssi/esphome-votronic@main
  tx_pin: GPIO4
  rx_pin: GPIO5
  rx_timeout: 150ms

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "syssi.esphome-votronic"
    version: 3.1.0
  # Den on_boot Block habe ich entfernt, da er den ESP nur blockiert.

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf  
    sdkconfig_options:
      # Diese beiden Zeilen schneiden WPA3 und SAE komplett aus dem WLAN-Treiber!
      # Der ESP32-C3 verhält sich danach beim Verbinden exakt wie dein alter ESP8266.
      CONFIG_ESP_WIFI_ENABLE_WPA3_SAE: "n"
      CONFIG_ESP_WIFI_SOFTAP_SAE_SUPPORT: "n"

external_components:
  - source: ${external_components_source}
    refresh: 0s

improv_serial: 

wifi:
  power_save_mode: NONE
  #fast_connect: true
  #reboot_timeout: 0s
  output_power: 8.5dB
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      #bssid: "D8:3A:DD:38:69:05"
  ap:
     ssid: "VShunt Setup"
     password: !secret ap_password

ota:
  platform: esphome

logger:
  level: INFO
  logs:
    votronic: ERROR

# NUR API benutzen, MQTT Block wurde entfernt um den Single-Core C3 zu entlasten
api:
  encryption: { key: !secret api_key }
  reboot_timeout: 120s

web_server:
  port: 80
  version: 3
  local: true

uart:
  - id: uart_0
    baud_rate: 1000
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    # Buffer erhöht. Fängt Daten auf, während der ESP mit dem WLAN-Handshake beschäftigt ist.
    rx_buffer_size: 1024 

votronic:
  - id: votronic0
    uart_id: uart_0
    rx_timeout: ${rx_timeout}
    throttle: 2s

binary_sensor:
  - platform: votronic
    votronic_id: votronic0
    charging:
      name: "${name} charging"
    discharging:
      name: "${name} discharging"

sensor:
  - platform: votronic
    votronic_id: votronic0
    battery_voltage:
      name: "${name} battery voltage"
    secondary_battery_voltage:
      name: "${name} secondary battery voltage"
    battery_capacity_remaining:
      name: "${name} battery capacity remaining"
    current:
      name: "${name} current"
    power:
      name: "${name} power"
    battery_nominal_capacity:
      name: "${name} battery nominal capacity"
    state_of_charge:
      name: "${name} state of charge"
    charger_mode_setting_id:
      name: "${name} charger mode setting id"
    battery_status_bitmask:
      name: "${name} battery status bitmask"

text_sensor:
  - platform: votronic
    votronic_id: votronic0
    charger_mode_setting:
      name: "${name} charger mode setting"
    battery_status:
      name: "${name} battery status"
